<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>

  <!-- ── Graph visualization on the right ── -->

  <!-- Edge lines -->
  <g opacity="0.5">
    <!-- API -> Socket edges -->
    <line x1="830" y1="130" x2="940" y2="200" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="830" y1="190" x2="940" y2="200" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- API -> DB edges -->
    <line x1="830" y1="270" x2="1060" y2="140" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="830" y1="270" x2="1060" y2="270" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- Socket -> DB edge -->
    <line x1="1000" y1="200" x2="1060" y2="270" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>

  <!-- API Node 1 -->
  <g transform="translate(720,105)" filter="url(#glow)">
    <rect width="120" height="50" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect width="120" height="14" rx="8" fill="#22c55e"/>
    <rect y="0" width="120" height="7" rx="0" fill="#22c55e"/>
    <text x="6" y="10" font-family="monospace" font-size="8" fill="white" font-weight="bold">GET</text>
    <text x="6" y="28" font-family="monospace" font-size="8" fill="#e2e8f0">/api/users</text>
    <text x="6" y="40" font-family="monospace" font-size="7" fill="#64748b">List all users</text>
  </g>

  <!-- API Node 2 -->
  <g transform="translate(720,165)" filter="url(#glow)">
    <rect width="120" height="50" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect width="120" height="14" rx="8" fill="#3b82f6"/>
    <rect y="0" width="120" height="7" rx="0" fill="#3b82f6"/>
    <text x="6" y="10" font-family="monospace" font-size="8" fill="white" font-weight="bold">POST</text>
    <text x="6" y="28" font-family="monospace" font-size="8" fill="#e2e8f0">/api/auth/login</text>
    <text x="6" y="40" font-family="monospace" font-size="7" fill="#64748b">Authenticate user</text>
  </g>

  <!-- API Node 3 -->
  <g transform="translate(720,245)" filter="url(#glow)">
    <rect width="120" height="50" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect width="120" height="14" rx="8" fill="#ef4444"/>
    <rect y="0" width="120" height="7" rx="0" fill="#ef4444"/>
    <text x="6" y="10" font-family="monospace" font-size="8" fill="white" font-weight="bold">DELETE</text>
    <text x="6" y="28" font-family="monospace" font-size="8" fill="#e2e8f0">/api/orders/:id</text>
    <text x="6" y="40" font-family="monospace" font-size="7" fill="#64748b">Cancel order</text>
  </g>

  <!-- Socket Node -->
  <g transform="translate(940,175)" filter="url(#glow)">
    <rect width="120" height="50" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5"/>
    <rect width="120" height="14" rx="8" fill="#0d9488"/>
    <rect y="0" width="120" height="7" rx="0" fill="#0d9488"/>
    <text x="6" y="10" font-family="monospace" font-size="8" fill="white" font-weight="bold">⚡ ON</text>
    <text x="6" y="28" font-family="monospace" font-size="8" fill="#e2e8f0">"chat:message"</text>
    <text x="6" y="40" font-family="monospace" font-size="7" fill="#64748b">Broadcast to room</text>
  </g>

  <!-- DB Node 1 -->
  <g transform="translate(1060,110)" filter="url(#glow)">
    <rect width="110" height="58" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <rect width="110" height="14" rx="8" fill="#15803d"/>
    <rect y="0" width="110" height="7" rx="0" fill="#15803d"/>
    <text x="6" y="10" font-family="monospace" font-size="7" fill="white">🗄 mongoose</text>
    <text x="6" y="26" font-family="monospace" font-size="9" fill="white" font-weight="bold">User</text>
    <text x="6" y="38" font-family="monospace" font-size="7" fill="#64748b">name, email</text>
    <text x="6" y="50" font-family="monospace" font-size="7" fill="#64748b">password, role</text>
  </g>

  <!-- DB Node 2 -->
  <g transform="translate(1060,240)" filter="url(#glow)">
    <rect width="110" height="58" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <rect width="110" height="14" rx="8" fill="#1d4ed8"/>
    <rect y="0" width="110" height="7" rx="0" fill="#1d4ed8"/>
    <text x="6" y="10" font-family="monospace" font-size="7" fill="white">🗄 prisma</text>
    <text x="6" y="26" font-family="monospace" font-size="9" fill="white" font-weight="bold">Order</text>
    <text x="6" y="38" font-family="monospace" font-size="7" fill="#64748b">id, userId</text>
    <text x="6" y="50" font-family="monospace" font-size="7" fill="#64748b">status, total</text>
  </g>

  <!-- Animated dots on edges -->
  <circle r="3" fill="#6366f1" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M830,130 L940,200"/>
  </circle>
  <circle r="3" fill="#6366f1" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M830,270 L1060,270"/>
  </circle>
  <circle r="3" fill="#14b8a6" opacity="0.9">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M1000,200 L1060,270"/>
  </circle>

  <!-- ── Left side: branding ── -->

  <!-- Glowing orb behind title -->
  <ellipse cx="300" cy="200" rx="200" ry="120" fill="#6366f1" opacity="0.05" filter="url(#softglow)"/>

  <!-- Icon / logo mark -->
  <g transform="translate(120, 155)" filter="url(#glow)">
    <circle cx="30" cy="20" r="6" fill="#6366f1" opacity="0.9"/>
    <circle cx="60" cy="40" r="6" fill="#14b8a6" opacity="0.9"/>
    <circle cx="30" cy="60" r="6" fill="#f59e0b" opacity="0.9"/>
    <circle cx="60" cy="80" r="6" fill="#22c55e" opacity="0.9"/>
    <line x1="30" y1="20" x2="60" y2="40" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="20" x2="30" y2="60" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
    <line x1="60" y1="40" x2="30" y2="60" stroke="#14b8a6" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="60" x2="60" y2="80" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="40" x2="60" y2="80" stroke="#14b8a6" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="200" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="900" fill="white" letter-spacing="-2">Repo</text>
  <text x="200" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="900" letter-spacing="-2">
    <tspan fill="url(#accent)">Map</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="275" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">
    Visualize any codebase — APIs, Sockets &amp; Databases
  </text>

  <!-- Badges -->
  <g transform="translate(200, 300)">
    <!-- Badge 1 -->
    <rect width="90" height="22" rx="11" fill="#312e81" opacity="0.8"/>
    <text x="10" y="15" font-family="monospace" font-size="10" fill="#a5b4fc">⚡ Next.js</text>
    <!-- Badge 2 -->
    <rect x="98" width="100" height="22" rx="11" fill="#134e4a" opacity="0.8"/>
    <text x="108" y="15" font-family="monospace" font-size="10" fill="#5eead4">🔀 React Flow</text>
    <!-- Badge 3 -->
    <rect x="206" width="110" height="22" rx="11" fill="#1c1917" opacity="0.8"/>
    <text x="216" y="15" font-family="monospace" font-size="10" fill="#d6d3d1">🤖 Claude AI</text>
  </g>

  <!-- Divider line -->
  <line x1="680" y1="40" x2="680" y2="360" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <!-- Section label -->
  <text x="720" y="80" font-family="monospace" font-size="10" fill="#475569">LIVE GRAPH PREVIEW</text>
  <text x="940" y="165" font-family="monospace" font-size="10" fill="#475569">SOCKETS</text>
  <text x="1060" y="100" font-family="monospace" font-size="10" fill="#475569">MODELS</text>
</svg>
